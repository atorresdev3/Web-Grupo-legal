		<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    </head>
    <body>
    
        <nav class="barra"> <!--MENU DE NAVEGACION-->
			
			<div class="barra-container">
				<div class="logo">
					<span class="logo-icono"><i class="ph ph-scales"></i></span>
					<div class="logo-texto">
						<small>GRUPO</small>
						<strong>LEGAL</strong>
					</div>
				</div>

				<ul class="menu">
					<li><a href="index.html">INICIO</a></li>

					<input type="text" placeholder="BUSCAR..." />
					<span><i class="ph ph-phone-call"></i></span>
				</div>
			</div>
		</nav>

        <section class="contacto">

            <h2>Solicite una <span>Consulta</span></h2>

            <form action="" class="formulario">

                <div class="campo">
                    <label>Nombre completo</label>
                    <input type="text" placeholder="Ingrese su nombre">
                </div>

                <div class="campo">
                    <label>Correo</label>
                    <input type="email" placeholder="Ingrese su correo">
                </div>

                <div class="campo">
                    <label>Telefono</label>
                    <input type="tel" placeholder="Ingrese su telefono">
                </div>

                <div class="campo">
                    <label>Área legal</label>
                    <select>
                        <option value="">-- Seleccione --</option>
                        <option value="civil">Civil</option>
                        <option value="penal">Penal</option>
                        <option value="comercial">Comercial</option>
                        <option value="familia">Familia</option>
                        <option value="trabajo">Trabajo</option>
                        <option value="otros">Otros</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="">Describa su caso</label>
                    <textarea rows="6" placeholder="Explíquenos brevemente su situación..."></textarea>
                </div>

                <button type="submit">Solicitar Consulta</button>

            </form>

        </section>



        <footer>
			<!--BLOQUE 4 FOOTER-->
			<div class="contenedor-footer">
				<div class="caja-icons">
					<div class="icon1">
						<span><i class="ph ph-map-pin-line"></i></span>
						<p>
							601 Lexington Ave <br />
							<strong>New York, NY 10022</strong>
						</p>
					</div>

					<div class="icon1">
						<span><i class="ph ph-phone-call"></i></span>
						<p>+1 800-555-1212</p>
					</div>

					<div class="icon1">
						<span><i class="ph ph-envelope"></i></span>
						<p><strong>grupolegal@gmail.com</strong></p>
					</div>
				</div>

				<div class="contenedor-map">

						src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d96708.35377387813!2d-74.05163354293781!3d40.75903219629817!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2588f046ee661%3A0xa0b3281fcecc08c!2sManhattan%2C%20Nueva%20York%2C%20EE.%20UU.!5e0!3m2!1ses-419!2sco!4v1780181079398!5m2!1ses-419!2sco"
						allowfullscreen=""

					>

		</footer>
